<!doctype html>
<html lang="en" data-theme="dark" class="h-full overflow-hidden">
  <head>
    <script src="/theme-init.js"></script>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://*.soniox.com; media-src 'self' mediastream:; font-src 'self'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExpressText</title>
    <style>
      /* Inline skeleton — shown before JS loads, replaced by SolidJS mount */
      .skeleton {
        display: flex;
        flex-direction: column;
        height: 100%;
        font-family: system-ui, sans-serif;
        animation: skeletonFadeIn 0.3s ease both;
      }
      .skeleton.fade-out {
        animation: skeletonFadeOut 0.25s ease both;
      }

      /* ── Header ── */
      .sk-header {
        height: 60px;
        background: var(--bg-raised, #10131b);
        border-bottom: 1px solid var(--border, #1a1f2e);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        flex-shrink: 0;
      }
      .sk-header-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .sk-header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .sk-pill {
        height: 24px;
        border-radius: 6px;
        background: var(--bg-surface, #161a25);
      }
      .sk-circle {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: var(--bg-surface, #161a25);
      }
      .sk-badge {
        height: 30px;
        width: 90px;
        border-radius: 999px;
        background: var(--bg-surface, #161a25);
      }
      .sk-divider {
        width: 1px;
        height: 24px;
        background: var(--border, #1a1f2e);
      }

      /* ── Controls bar ── */
      .sk-controls {
        height: 72px;
        background: var(--bg, #080a10);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        flex-shrink: 0;
      }
      .sk-controls-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sk-controls-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sk-btn {
        height: 40px;
        border-radius: 8px;
        background: var(--bg-surface, #161a25);
      }

      /* ── Panels ── */
      .sk-main {
        flex: 60;
        display: flex;
        gap: 0;
        padding: 8px 8px 0;
        background: var(--bg, #080a10);
        min-height: 0;
      }
      .sk-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        overflow: hidden;
      }
      .sk-panel-header {
        height: 42px;
        border-bottom: 1px solid var(--border, #1a1f2e);
        display: flex;
        align-items: center;
        padding: 0 16px;
        flex-shrink: 0;
      }
      .sk-panel-label {
        height: 12px;
        width: 64px;
        border-radius: 4px;
        background: var(--bg-surface, #161a25);
      }
      .sk-panel-body {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      .sk-panel-body::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.02) 50%,
          transparent 100%
        );
        animation: shimmer 2s ease-in-out infinite;
      }
      .sk-resize-h {
        width: 8px;
        flex-shrink: 0;
      }

      /* ── Viz pane (toolbar + history) ── */
      .sk-vizpane {
        flex: 40;
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: var(--bg, #080a10);
        border-top: 1px solid var(--border, #1a1f2e);
      }
      .sk-viz-toolbar {
        height: 52px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border, #1a1f2e);
      }
      .sk-viz-spacer {
        flex: 1;
      }
      .sk-viz-history {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      .sk-viz-history::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.02) 50%,
          transparent 100%
        );
        animation: shimmer 2s ease-in-out infinite;
      }

      /* ── Animations ── */
      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }
      @keyframes skeletonFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes skeletonFadeOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }

      /* Logo theme toggle */
      .sk-logo-dark {
        display: block;
      }
      .sk-logo-light {
        display: none;
      }
      [data-theme="light"] .sk-logo-dark {
        display: none;
      }
      [data-theme="light"] .sk-logo-light {
        display: block;
      }

      /* Light theme overrides */
      [data-theme="light"] .sk-header {
        background: #ffffff;
        border-color: #d4d6dc;
      }
      [data-theme="light"] .sk-pill,
      [data-theme="light"] .sk-circle,
      [data-theme="light"] .sk-badge,
      [data-theme="light"] .sk-btn,
      [data-theme="light"] .sk-panel-label {
        background: #ecedf1;
      }
      [data-theme="light"] .sk-controls,
      [data-theme="light"] .sk-main,
      [data-theme="light"] .sk-vizpane {
        background: #f2f3f6;
      }
      [data-theme="light"] .sk-panel-header,
      [data-theme="light"] .sk-vizpane,
      [data-theme="light"] .sk-viz-toolbar {
        border-color: #d4d6dc;
      }
      [data-theme="light"] .sk-divider {
        background: #d4d6dc;
      }
      [data-theme="light"] .sk-panel-body::after,
      [data-theme="light"] .sk-viz-history::after {
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(0, 0, 0, 0.03) 50%,
          transparent 100%
        );
      }
    </style>
  </head>
  <body class="h-full overflow-hidden font-ui bg-bg text-tx antialiased flex flex-col">
    <div id="root" class="h-full flex flex-col overflow-hidden">
      <!-- Skeleton shown instantly, replaced when SolidJS mounts -->
      <div class="skeleton" id="app-skeleton">
        <!-- Header -->
        <div class="sk-header">
          <div class="sk-header-left">
            <img
              src="./src/assets/logo-dark.png"
              alt=""
              style="height: 32px; width: auto; object-fit: contain"
              class="sk-logo-dark"
            />
            <img
              src="./src/assets/logo.png"
              alt=""
              style="height: 32px; width: auto; object-fit: contain"
              class="sk-logo-light"
            />
            <div class="sk-divider"></div>
            <div class="sk-pill" style="width: 80px"></div>
            <div class="sk-pill" style="width: 64px"></div>
            <div class="sk-pill" style="width: 100px"></div>
            <div class="sk-pill" style="width: 72px"></div>
          </div>
          <div class="sk-header-right">
            <div class="sk-circle"></div>
            <div class="sk-circle"></div>
            <div class="sk-divider"></div>
            <div class="sk-badge"></div>
          </div>
        </div>

        <!-- Controls bar -->
        <div class="sk-controls">
          <div class="sk-controls-left">
            <div class="sk-btn" style="width: 420px; border-radius: 10px"></div>
          </div>
          <div class="sk-controls-right">
            <div class="sk-btn" style="width: 90px"></div>
            <div class="sk-btn" style="width: 80px"></div>
            <div class="sk-btn" style="width: 90px"></div>
            <div class="sk-btn" style="width: 80px"></div>
          </div>
        </div>

        <!-- Main panels -->
        <div class="sk-main">
          <div class="sk-panel">
            <div class="sk-panel-header">
              <div class="sk-panel-label"></div>
            </div>
            <div class="sk-panel-body"></div>
          </div>
          <div class="sk-resize-h"></div>
          <div class="sk-panel">
            <div class="sk-panel-header">
              <div class="sk-panel-label" style="width: 80px"></div>
            </div>
            <div class="sk-panel-body"></div>
          </div>
        </div>

        <!-- Viz pane: toolbar (top) + history log (shimmer below) -->
        <div class="sk-vizpane">
          <div class="sk-viz-toolbar">
            <div class="sk-pill" style="width: 90px; height: 18px"></div>
            <div class="sk-divider"></div>
            <div class="sk-btn" style="width: 110px; height: 32px"></div>
            <div class="sk-btn" style="width: 90px; height: 32px"></div>
            <div class="sk-btn" style="width: 90px; height: 32px"></div>
            <div class="sk-viz-spacer"></div>
            <div class="sk-pill" style="width: 200px; height: 28px; border-radius: 999px"></div>
            <div class="sk-viz-spacer"></div>
            <div class="sk-pill" style="width: 140px; height: 24px"></div>
            <div class="sk-btn" style="width: 80px; height: 32px"></div>
            <div class="sk-divider"></div>
            <div class="sk-badge"></div>
          </div>
          <div class="sk-viz-history"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./src/index.tsx"></script>
  </body>
</html>
