<!doctype html>
<html lang="en" data-theme="dark" class="h-full overflow-hidden">
  <head>
    <script src="/theme-init.js"></script>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://*.soniox.com; media-src 'self' mediastream:; font-src 'self'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExpressText</title>
    <style>
      /* Inline skeleton — shown before JS loads, removed by SolidJS mount */
      .skeleton {
        display: flex;
        flex-direction: column;
        height: 100%;
        font-family: system-ui, sans-serif;
      }
      .skeleton-bar {
        height: 60px;
        background: var(--bg-raised, #13161f);
        border-bottom: 1px solid var(--border, #1f2433);
        display: flex;
        align-items: center;
        padding: 0 24px;
        gap: 14px;
        flex-shrink: 0;
      }
      .skeleton-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .skeleton-text span {
        font-size: 11px;
        color: var(--text-3, #6b7394);
      }
      .skeleton-body {
        flex: 1;
        display: flex;
        gap: 16px;
        padding: 16px;
        background: var(--bg, #0c0f16);
      }
      .skeleton-panel {
        flex: 1;
        border-radius: 14px;
        background: var(--bg-raised, #13161f);
        border: 1px solid var(--border, #1f2433);
        overflow: hidden;
        position: relative;
      }
      .skeleton-panel::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.03) 50%,
          transparent 100%
        );
        animation: shimmer 1.5s ease-in-out infinite;
      }
      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }
    </style>
  </head>
  <body class="h-full overflow-hidden font-ui bg-bg text-tx antialiased flex flex-col">
    <div id="root" class="h-full flex flex-col overflow-hidden">
      <!-- Skeleton shown instantly, replaced when SolidJS mounts -->
      <div class="skeleton">
        <div class="skeleton-bar">
          <img
            src="./src/assets/logo.png"
            alt="Express 24/7"
            style="height: 40px; width: auto; object-fit: contain"
          />
        </div>
        <div class="skeleton-body">
          <div class="skeleton-panel"></div>
          <div class="skeleton-panel"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./src/index.tsx"></script>
  </body>
</html>
